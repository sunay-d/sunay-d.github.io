<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css"/>
    <title>Random Password Generator</title>

    <style>
        .rectangle {
          height: 50px;
          width: 500px;
        }
    </style>
</head>

<body>
    <div id="main">
        <h1 id="primarytitle">Random Password Generator</h1>
        <div id="generate">  
            <table>
                <tr>
                    <td><div id="rectangle" class="rectangle"></div></td>
                    <td><button id="generatebutton" onclick="generate()">Generate</button></td>
                </tr>
            </table>        
        </div><br>
        <div id="custom">
            <h3 id="secondarytitle">Customize your password</h3>
            <div id="inputdata"> 
                <input id="length" type="text" maxlength="2" placeholder="password length" value="12"></input>
                <input id="chars" type="text" maxlength="10" placeholder="special characters" value="%!*@#$()^&"></input>
            </div><br>
            <div id="check">
                <text id="use"><b>Use</b></text>
                <input id= num type="checkbox" checked>numbers</input>
                <input id= upper type="checkbox" checked>upper case</input>
                <input id=lower type="checkbox" checked>lower case</input> 
            </div>
        </div>
    </div>
    
    <script src="js/function.js"></script> 
</body>

</html>
